<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: Arial, sans-serif; font-size: 14px; background: #f0f2f5; }

        .hms-wrapper { display: flex; min-height: 100vh; }

        /* ── Sidebar ── */
        .sidebar {
            width: 220px;
            background: #1e2a3a;
            color: #fff;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 18px;
            font-weight: 600;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: #4a6080;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        .sidebar-welcome {
            padding: 12px 16px;
            font-size: 12px;
            color: #aab4c0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .sidebar-nav a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 16px;
            color: #cdd6e0;
            text-decoration: none;
            font-size: 13px;
        }

        .sidebar-nav a:hover { background: rgba(255,255,255,0.07); color: #fff; }

        /* ── Topbar ── */
        .topbar {
            background: #fff;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e0e0e0;
        }

        .topbar-title { font-size: 15px; font-weight: 600; }

        .topbar-user { font-size: 13px; color: #555; }

        /* ── Main ── */
        .main { flex: 1; display: flex; flex-direction: column; }

        .content { padding: 20px; flex: 1; }

        .page-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 16px;
            color: #222;
        }

        /* ── Action bar ── */
        .action-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .action-bar button {
            background: #1e2a3a;
            color: #fff;
            border: none;
            border-radius: 5px;
            padding: 10px 20px;
            font-size: 13px;
            cursor: pointer;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .action-bar button:hover { background: #2d5fa6; }

        /* ── Dynamic content card ── */
        .section {
            background: #fff;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            margin-bottom: 16px;
        }

        .section-body { padding: 20px; }

        /* ── Headings inside #content ── */
        #content h2 {
            font-size: 17px;
            font-weight: 600;
            color: #1e2a3a;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2d5fa6;
            display: inline-block;
        }

        /* ── Sub-action buttons (Add/View inside sections) ── */
        #content > button,
        #content button[onclick^="show"],
        #content button[onclick^="save"],
        #content button[onclick^="update"],
        #studentContent button,
        #employeeContent button,
        #roomContent button,
        #facilityContent button,
        #noticeContent button,
        #rentContent button {
            background: #2d5fa6;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            margin-right: 8px;
            margin-bottom: 16px;
            font-weight: 500;
        }

        #content > button:hover,
        #content button[onclick^="show"]:hover,
        #content button[onclick^="save"]:hover,
        #content button[onclick^="update"]:hover {
            background: #254f8c;
        }

        /* ── Form inputs inside #content ── */
        #content input[type="text"],
        #content input[type="number"],
        #content input[type="password"],
        #content input[type="hidden"],
        #content textarea,
        #content select {
            width: 100%;
            max-width: 400px;
            display: block;
            border: 1.5px solid #d0d5dd;
            border-radius: 5px;
            padding: 9px 12px;
            font-size: 14px;
            color: #333;
            background: #fff;
            outline: none;
            margin-bottom: 14px;
            font-family: Arial, sans-serif;
        }

        #content input[type="text"]:focus,
        #content input[type="number"]:focus,
        #content input[type="password"]:focus,
        #content textarea:focus,
        #content select:focus {
            border-color: #2d5fa6;
        }

        #content textarea {
            min-height: 90px;
            resize: vertical;
        }

        /* ── Tables inside #content ── */
        #content table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 8px;
        }

        #content table th {
            background: #1e2a3a;
            color: #fff;
            padding: 10px 14px;
            text-align: left;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 0.04em;
            border: none;
        }

        #content table td {
            padding: 10px 14px;
            border-bottom: 1px solid #f0f0f0;
            color: #333;
            border: none;
        }

        #content table tr:nth-child(even) td { background: #f8f9fb; }

        #content table tr:hover td { background: #eef3fb; }

        /* Edit / Delete buttons inside table cells */
        #content table button {
            padding: 5px 12px;
            font-size: 12px;
            border-radius: 4px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            margin-right: 4px;
        }

        #content table button[onclick^="edit"] {
            background: #e8f0fe;
            color: #2d5fa6;
        }

        #content table button[onclick^="edit"]:hover {
            background: #2d5fa6;
            color: #fff;
        }

        #content table button[onclick^="delete"] {
            background: #fdecea;
            color: #c0392b;
        }

        #content table button[onclick^="delete"]:hover {
            background: #c0392b;
            color: #fff;
        }

        /* ── Footer ── */
        .footer {
            padding: 10px 20px;
            font-size: 11px;
            color: #888;
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #e0e0e0;
            background: #fff;
        }
    </style>
</head>
<body>

<div class="hms-wrapper">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="avatar">A</div>
            <span>GHMS</span>
        </div>
        <div class="sidebar-welcome">Welcome Admin,</div>
        <nav class="sidebar-nav">
            <a href="#">⊞ Dashboard</a>
            <a href="#" onclick="studentSection()">👤 Students</a>
            <a href="#" onclick="employeeSection()">👔 Employees</a>
            <a href="#" onclick="roomSection()">🛏 Rooms</a>
            <a href="#" onclick="facilitySection()">🏗 Facilities</a>
            <a href="#" onclick="noticeSection()">🔔 Notices</a>
            <a href="#" onclick="rentSection()">💳 Rent</a>
            <a href="login.html">🚪 Logout</a>
        </nav>
    </aside>

    <!-- Main -->
    <div class="main">

        <header class="topbar">
            <div style="font-size:20px;cursor:pointer;color:#555;">☰</div>
            <div class="topbar-title">Girls Hostel Management System</div>
            <div class="topbar-user">Admin &nbsp;
                <a href="login.html" style="color:#555;text-decoration:none;">✕</a>
            </div>
        </header>

        <div class="content">

            <h1 class="page-title">Admin Dashboard</h1>

            <!-- Action buttons -->
            <div class="action-bar">
                <button onclick="studentSection()">Students</button>
                <button onclick="employeeSection()">Employees</button>
                <button onclick="roomSection()">Rooms</button>
                <button onclick="facilitySection()">Facilities</button>
                <button onclick="noticeSection()">Notices</button>
                <button onclick="rentSection()">Rent</button>
            </div>

            <!-- Dynamic content from admin.js -->
            <div class="section">
                <div class="section-body">
                    <div id="content"></div>
                </div>
            </div>

        </div>

        <footer class="footer">
            <span><strong>Copyright © 2025.</strong> All rights reserved.</span>
            <span>Version 3.1.0</span>
        </footer>

    </div>
</div>

<script src="js/admin.js"></script>

</body>
</html>
